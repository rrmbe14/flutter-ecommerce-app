name: ecommerce_app
description: A Flutter e-commerce capstone — Cubit + http + SharedPreferences.
publish_to: "none"
version: 0.0.0

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  bloc_test: ^9.1.7
  build_runner: ^2.10.4
  flutter_test:
    sdk: flutter
  mockito: ^5.6.1

flutter:
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
  uses-material-design: true
